<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>植物健康评估系统</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app">
    <header class="hero">
      <div>
        <p class="tag">AI Plant Health System</p>
        <h1>植物健康评估系统</h1>
        <p class="desc">
          上传一张植物叶片图片，系统将自动调用植物种类识别、叶片病变识别和虫害识别模型，生成完整健康评估报告。
        </p>
      </div>
      <div class="status-card">
        <span class="dot"></span>
        <span>本地模型接口模式</span>
      </div>
    </header>

    <main class="layout">
      <section class="card upload-card">
        <h2>1. 上传植物图片</h2>

        <label class="upload-box" id="dropArea">
          <input type="file" id="imageInput" accept="image/*" hidden />
          <div class="upload-icon">🌿</div>
          <h3>点击或拖拽图片到这里</h3>
          <p>支持 JPG / PNG / JPEG</p>
        </label>

        <div class="preview-wrap hidden" id="previewWrap">
          <img id="previewImage" alt="图片预览" />
          <button class="ghost-btn" id="clearBtn">重新选择</button>
        </div>

        <div class="progress-box hidden" id="progressBox">
          <div class="progress-info">
            <span id="progressText">准备分析...</span>
            <strong id="progressPercent">0%</strong>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-steps">
            <span id="stepSpecies">植物种类识别</span>
            <span id="stepDisease">叶片病变识别</span>
            <span id="stepPest">虫害识别</span>
          </div>
        </div>

        <button class="primary-btn" id="analyzeBtn" disabled>
          开始智能分析
        </button>
      </section>

      <section class="card result-card">
        <h2>2. 模型识别结果</h2>

        <div class="loading hidden" id="loading">
          <div class="spinner"></div>
          <p>正在调用三个模型，请稍候...</p>
        </div>

        <div class="empty" id="emptyState">
          <div>📷</div>
          <p>请先上传图片，然后点击“开始智能分析”。</p>
        </div>

        <div class="results hidden" id="results">
          <div class="result-grid">
            <div class="mini-card">
              <span class="label">植物种类识别</span>
              <h3 id="speciesName">--</h3>
              <p id="speciesConfidence">置信度：--</p>
            </div>

            <div class="mini-card">
              <span class="label">叶片病变识别</span>
              <h3 id="diseaseName">--</h3>
              <p id="diseaseConfidence">置信度：--</p>
            </div>

            <div class="mini-card">
              <span class="label">虫害识别</span>
              <h3 id="pestName">--</h3>
              <p id="pestConfidence">检测状态：--</p>
            </div>
          </div>

          <div class="top-list">
            <h3>病变模型 Top 结果</h3>
            <ul id="diseaseTopList"></ul>
          </div>
        </div>
      </section>
    </main>

    <section class="card report-card hidden" id="reportCard">
      <div class="report-head">
        <div>
          <p class="tag">Health Report</p>
          <h2>3. 植物健康评估报告</h2>
        </div>
        <button class="ghost-btn" onclick="window.print()">打印报告</button>
      </div>

      <div class="report-content" id="reportContent"></div>
    </section>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
